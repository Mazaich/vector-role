---
- name: Install tar on Oracle Linux (raw)
  raw: dnf install -y tar
  args:
    executable: /bin/bash
  changed_when: false
  when: ansible_os_family == "RedHat"

- name: Ensure tar is installed (Debian family)
  package:
    name: tar
    state: present
  when: ansible_os_family == "Debian"

- name: Create Vector installation directory
  file:
    path: "{{ vector_install_dir | default('/opt/vector') }}"
    state: directory
    mode: '0755'

- name: Download Vector archive
  get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu.tar.gz"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: '0644'
  register: download_vector

- name: Extract Vector archive
  unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "{{ vector_install_dir | default('/opt/vector') }}"
    remote_src: yes
    extra_opts: [--strip-components=2]
    creates: "{{ vector_install_dir | default('/opt/vector') }}/bin/vector"

- name: Create symbolic link to vector binary
  file:
    src: "{{ vector_install_dir | default('/opt/vector') }}/bin/vector"
    dest: "/usr/local/bin/vector"
    state: link
